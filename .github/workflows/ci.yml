name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unit-checks:
    name: Formatting, Linting, Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned)
        uses: dtolnay/rust-toolchain@stable

      - name: Install components
        run: |
          rustup component add clippy rustfmt || true

      - name: Format check
        run: cargo fmt -- --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features

      - name: Run unit/library tests (offline)
        env:
          MANGOFETCH_OFFLINE: "1"
        run: cargo test --workspace --lib --quiet

  security:
    name: Security checks (cargo-audit)
    runs-on: ubuntu-latest
    needs: unit-checks
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true
      - name: Run cargo-audit
        run: cargo audit
